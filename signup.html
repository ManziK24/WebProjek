<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Signup</title>
    <link rel="stylesheet" href="forms.css">
    <meta name="author" content="THE A TEAM">
  </head>


  <body>

    <header>
      <div class="title">
        <a href="../../index.html"><h1>Plant Marketplace</h1></a>
      </div>


    <nav>
      <div class="navigation">
        <a href="./login.html">Login</a> |
        <a href="./signup.html">Sign Up</a> |
        <a href="./categories.html">Categories</a> |
        <a href="./aboutme.html">About Us</a> |
      </div>
     </nav>
    </header>


    <main>
      <div class="formContainer">
        <div class="formTitle">
          <h2>Sign Up</h2>
        
        </div>

        <form class="formContent" id="signupForm" method="post" action="register.php">
          <div class="fieldGroup">
            <label for="userName">Username</label>
            <input type="text" id="userName" name="userName" placeholder="John123" required>
          </div>

          <div class="fieldGroup">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
          </div>

          <div class="fieldGroup">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="password" required>
          </div>

          <div class="fieldGroup">
            <label for="passwordConfirm">Confirm Password</label>
            <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="confirm password" required>
          </div>

          <div class="fieldGroup checkboxRow">
              <label for="captcha">I am not a robot</label>
            <input type="checkbox" name="captcha" value="captcha" id="captcha" required>
          
          </div>
          <button type="submit" class="btn" value="Sign Up" name="signUp" />Sign Up</button>
        </form>

        <div>
          <div class = "form-links">
            <p> Already have an account? <a href="./login.html"> Sign In</a></p>
      </div>
        </div>
    </main>

  </body>
</html>
